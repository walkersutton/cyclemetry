name: Windows Build (exploratory)

# Build-only signal for the Windows port. This proves whether the app
# COMPILES and BUNDLES on Windows — it does NOT exercise rendering, so
# runtime gaps (e.g. path layout, codec availability) will not surface here;
# those need an actual render run on real hardware.
# Standalone and non-blocking: a failing run is the breakage signal.

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # Download a static Windows ffmpeg (LGPL) and place it where
      # tauri.windows.conf.json expects it so it gets bundled in the installer.
      # prores_ks (CPU ProRes encoder) is included in LGPL builds.
      - name: Fetch Windows FFmpeg
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-lgpl.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_extracted
          $exe = Get-ChildItem -Recurse ffmpeg_extracted -Filter "ffmpeg.exe" |
                   Where-Object { $_.DirectoryName -like "*bin*" } |
                   Select-Object -First 1
          Copy-Item $exe.FullName resources/ffmpeg.exe
          Write-Host "Bundled ffmpeg: $((Get-Item resources/ffmpeg.exe).Length) bytes"

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app (no signing, no release)
        run: pnpm tauri build --bundles nsis

      - name: Upload installer artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: cyclemetry-windows
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
