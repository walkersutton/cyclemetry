name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    # Signing secrets live in the "cyclemetry" GitHub Environment; a job only
    # receives environment-scoped secrets if it declares the environment.
    environment: cyclemetry
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup FFmpeg
        run: |
          brew install ffmpeg || true
          cp $(which ffmpeg) resources/ffmpeg

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        # createUpdaterArtifacts is enabled here (CI only) — not in
        # tauri.conf.json — so local `pnpm build` doesn't require the
        # signing key. CI has it via the secrets below.
        run: pnpm tauri build --config '{"bundle":{"createUpdaterArtifacts":true}}'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Generate update manifest
        run: |
          VERSION=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          SIG=$(cat "src-tauri/target/release/bundle/macos/Cyclemetry.app.tar.gz.sig")
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          jq -n \
            --arg version "$VERSION" \
            --arg sig "$SIG" \
            --arg url "https://github.com/walkersutton/cyclemetry/releases/download/v${VERSION}/Cyclemetry.app.tar.gz" \
            --arg pub_date "$PUB_DATE" \
            '{
              version: $version,
              notes: "See the release page for details.",
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": {
                  signature: $sig,
                  url: $url
                }
              }
            }' > latest.json

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/Cyclemetry.app.tar.gz
            latest.json
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
